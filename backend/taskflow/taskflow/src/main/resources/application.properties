spring.application.name=taskflow
# Fixer le nom de la base de données pour éviter l'identifiant aléatoire
spring.datasource.url=jdbc:h2:mem:taskflowdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Indique à Hibernate de créer et mettre à jour automatiquement les tables selon tes entités @Entity
spring.jpa.hibernate.ddl-auto=update
# Activer la console Web H2
spring.h2.console.enabled=true
# Définir le chemin d'accès à la console
spring.h2.console.path=/h2-console

# Affichage des requêtes SQL d'Hibernate dans tes logs de console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true