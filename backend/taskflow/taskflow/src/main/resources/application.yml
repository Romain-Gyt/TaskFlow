spring:
  application:
    name: taskflow

  # Configuration de la base de données H2
  datasource:
    url: jdbc:h2:mem:taskflowdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # Console Web H2 (utile pour déboguer rapidement)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Configuration JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Activation des Virtual Threads de Java 21+ (Tomcat)
  threads:
    virtual:
      enabled: true

# Configuration personnalisée de ton moteur de scoring RSE
rse:
  scoring:
    carbon:
      name: "CARBON_FOOTPRINT"
      high-score: 50
      default-score: 10
      keywords:
        - "maven"
        - "infrastructure"
    inclusion:
      name: "DIGITAL_INCLUSION"
      high-score: 40
      default-score: 5
      keywords:
        - "ui"
        - "accessibilité"